{% load static %}
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>{% block title %}ReportOne{% endblock %}</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- CSS personalizado -->
    <link rel="stylesheet" href="{% static 'solicitudes/css/styles.css' %}">
    </head>
    <body>
        <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
            <div class="container">

            <!-- Marca / Nombre del sistema -->
            <a class="navbar-brand" href="{% url 'inicio' %}">
            Sistema Solicitudes
            </a>

            <!-- Botón responsive -->
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
            <span class="navbar-toggler-icon"></span>
            </button>

            <!-- Opciones del menú -->
            <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav ms-auto">

                <!-- Inicio -->
                <li class="nav-item">
                <a class="nav-link" href="{% url 'inicio' %}">Inicio</a>
                </li>

                <!-- Lista solicitudes -->
                <li class="nav-item">
                <a class="nav-link" href="{% url 'solicitudes:lista' %}">Solicitudes</a>
                </li>

                <!-- Nueva solicitud -->
                <li class="nav-item">
                <a class="nav-link" href="{% url 'solicitudes:nuevo' %}">Nueva</a>
                </li>

            </ul>
            </div>

            </div>      
        </nav>
        <div class="container">
            {% block content %}{% endblock %}
        </div>
    <!-- Bootstrap JS Bundle -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    {% block scripts %}{% endblock %}
</body>
</html>
